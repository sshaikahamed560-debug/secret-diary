{% extends 'base.html' %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/diary.css') }}">
{% endblock %}

{% block content %}

<div class="diary-container">

    <div class="book">

        <div class="spiral"></div>

        <div class="left-page">

            <h1>✏ Edit Memory</h1>

            <form method="POST">

                <input type="text" name="title" value="{{ entry.title }}" required>

                <textarea name="content" required>{{ entry.content }}</textarea>

                <button type="submit">

                    💖 Update Memory

                </button>

            </form>

        </div>

        <div class="right-page">

            <h2>

                Editing Entry

            </h2>

            <p>

                Make your changes and click Update.

            </p>

        </div>

    </div>

</div>

{% endblock %}
